name: Windows Python CI

on:
  push:
    branches:
      - master
    tags:
      - '*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    working-directory: ./python

jobs:
  windows:
    name: Build
    runs-on: windows-latest
    strategy:
      matrix:
        python_version: ['3.11', '3.14']
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: '0.10.12'
          python-version: ${{ matrix.python_version }}
          enable-cache: false
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          working-directory: "python"
          args: -r --strip --out dist --find-interpreter
          sccache: 'true'
      - name: Test the wheel
        run: |
          uv venv
          uv pip install -r pyproject.toml --extra dev
          uv pip install yaroc --pre --find-links dist
          uv run pytest
      - name: Lint with ruff
        run: |
          uv tool install ruff
          ruff check . --select=E9,F63,F7,F82 --statistics
          ruff check . --exit-zero --statistics
      - name: Upload wheels
        if: matrix.python_version == '3.11'
        uses: actions/upload-artifact@v6
        with:
          name: wheels
          path: python/dist

  release:
    name: Release
    runs-on: ubuntu-latest
    if: "startsWith(github.ref, 'refs/tags/')"
    needs: windows
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: wheels
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: uv publish --skip-existing *
