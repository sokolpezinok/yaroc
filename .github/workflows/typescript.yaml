name: TypeScript

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./typescript
    steps:
    - uses: actions/checkout@v5
    - name: Packages
      run: sudo apt update && sudo apt install -y protobuf-compiler libdbus-1-dev libudev-dev pkg-config
    - name: Set up Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: typescript/package.json
    - name: Install npm dependencies
      run: npm install
    - name: Build NPM package
      run: npm run build
    - name: Run typecheck
      run: npm run typecheck
