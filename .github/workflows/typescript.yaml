name: TypeScript

on:
  push:
    branches: [ "master" ]
    tags:
      - 'ts-v*'
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            args: --platform --release
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            args: --platform --release
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            args: --platform --release --zig
            use_zig: true
    name: Typescript (${{ matrix.settings.target }})
    runs-on: ${{ matrix.settings.host }}
    defaults:
      run:
        working-directory: ./typescript
    steps:
    - uses: actions/checkout@v5
    - name: Packages (Linux)
      if: matrix.settings.host == 'ubuntu-latest'
      run: sudo apt update && sudo apt install -y libdbus-1-dev libudev-dev pkg-config
    - name: Set up Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        target: ${{ matrix.settings.target }}
    - name: Set up Zig
      if: matrix.settings.use_zig
      uses: xyzzylabs/setup-zig@v1
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: typescript/package.json
    - name: Install npm dependencies
      run: npm install
    - name: Build NPM package
      run: npx napi build --cargo-cwd ../napi --js index.js --dts index.d.ts --target ${{ matrix.settings.target }} ${{ matrix.settings.args }}
    - name: Run typecheck
      if: matrix.settings.target == 'x86_64-unknown-linux-gnu'
      run: npm run typecheck
    - name: Upload artifact
      uses: actions/upload-artifact@v6
      with:
        name: bindings-${{ matrix.settings.target }}
        path: typescript/*.node

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/ts-v')
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: ./typescript
    steps:
    - uses: actions/checkout@v5
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22'
        registry-url: 'https://registry.npmjs.org'
    - name: Install npm dependencies
      run: npm install
    - name: Download artifacts
      uses: actions/download-artifact@v8
      with:
        path: typescript/npm-artifacts
    - name: Move artifacts to target locations
      run: |
        npx napi create-npm-dir -t .
        cp npm-artifacts/bindings-x86_64-unknown-linux-gnu/*.node npm/linux-x64-gnu/
        cp npm-artifacts/bindings-aarch64-unknown-linux-gnu/*.node npm/linux-arm64-gnu/
        cp npm-artifacts/bindings-x86_64-pc-windows-msvc/*.node npm/win32-x64-msvc/
    - name: Publish to NPM
      run: |
        # Publish all platform-specific subpackages first
        for dir in npm/*; do
          if [ -d "$dir" ]; then
            echo "Publishing $dir..."
            if [[ "${{ github.ref_name }}" == *beta* ]]; then
              npm publish "$dir" --access public --tag beta
            else
              npm publish "$dir" --access public
            fi
          fi
        done

        # Publish the main wrapper package last
        if [[ "${{ github.ref_name }}" == *beta* ]]; then
          npm publish --access public --tag beta
        else
          npm publish --access public
        fi
