name: Linux Python CI

on:
  push:
    branches:
      - master
    tags:
      - '*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    working-directory: ./python

jobs:
  linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64, aarch64, armv7]
        python_version: ['3.11', '3.14']
    steps:
      - uses: actions/checkout@v5
      - name: Install uv with all available options
        uses: astral-sh/setup-uv@v7
        with:
          version: '0.10.12'
          python-version: ${{ matrix.python_version }}
          enable-cache: false
      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: -r --out dist --find-interpreter --strip --compatibility pypi
          sccache: true
          working-directory: "python"
          before-script-linux: yum install -y dbus-devel pkgconfig && yum -y clean all
          manylinux: 2_28
      - name: Test the wheel
        if: matrix.target == 'x86_64'
        run: |
          uv venv
          uv pip install -r pyproject.toml --extra dev
          uv pip install yaroc --pre --find-links dist
          source .venv/bin/activate
          pytest
      - name: Lint with ruff
        if: matrix.target == 'x86_64'
        run: |
          uv tool install ruff
          ruff check . --select=E9,F63,F7,F82 --statistics
          ruff check . --exit-zero --statistics
      - name: Upload wheels
        if: matrix.python_version == '3.11'
        uses: actions/upload-artifact@v6
        with:
          name: wheels-linux-${{ matrix.target }}
          path: python/dist

  linux-armv6:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Build wheel
        working-directory: "python"
        run: |
          pip install maturin ziglang
          rustup target add arm-unknown-linux-gnueabihf
          maturin build -r --strip --target arm-unknown-linux-gnueabihf --zig --out dist --compatibility pypi
      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-linux-armv6
          path: python/dist

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          working-directory: "python"
      - name: Upload sdist
        uses: actions/upload-artifact@v6
        with:
          name: wheels-sdist
          path: python/dist

  release:
    name: Release
    runs-on: ubuntu-latest
    if: "startsWith(github.ref, 'refs/tags/')"
    needs: [linux, linux-armv6, sdist]
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Publish to PyPI
        working-directory: .
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: uv publish dist/*
